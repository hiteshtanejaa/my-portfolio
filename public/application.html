<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Simple scrollbar styling for a more modern look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200">

    <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <!-- Header Section -->
        <header class="text-center mb-10">
            <h1 class="text-4xl sm:text-5xl font-bold text-white tracking-tight">Job Application Hub</h1>
            <p class="mt-3 text-lg text-gray-400">A centralized place to review targeted job applications and tailored resumes.</p>
        </header>

        <!-- Search Bar Section -->
        <div class="mb-8 max-w-2xl mx-auto">
            <input type="text" id="searchInput" placeholder="Search by company or title..." class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow duration-200">
        </div>

        <!-- Job Application Grid -->
        <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Job cards will be dynamically inserted here by JavaScript -->
        </div>
        
        <!-- Not Found Message -->
        <div id="not-found" class="text-center py-12 text-gray-500 hidden">
             <svg class="mx-auto h-12 w-12 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <h3 class="mt-2 text-lg font-medium text-gray-300">No applications found</h3>
            <p class="mt-1 text-gray-500">Your search did not match any applications. Try a different keyword.</p>
        </div>
    </div>

    <script>
        // --- DATA ---
        // This is where you'll manage your job application data.
        // To add a new job, just copy one of the objects and fill in your details.
        // Replace '#' with the actual links.
        const jobs = [
            { company: 'Acron Aviation', title: 'Aerospace Engineer', jobId: 'ACN-001', jobLink: '#', resumeLink: '#' },
            { company: 'Thales', title: 'Systems Engineer', jobId: 'THL-112', jobLink: '#', resumeLink: '#' },
            { company: 'Boeing', title: 'Structural Analyst', jobId: 'BOE-589', jobLink: '#', resumeLink: '#' },
            { company: 'BAE Systems', title: 'Software Developer', jobId: 'BAE-303', jobLink: '#', resumeLink: '#' },
            { company: 'Barclays', title: 'Financial Analyst', jobId: 'BAR-FIN-05', jobLink: '#', resumeLink: '#' },
            { company: 'Morgan Stanley', title: 'Investment Banking Associate', jobId: 'MS-IB-21', jobLink: '#', resumeLink: '#' },
            { company: 'Citi Bank', title: 'Data Scientist', jobId: 'CITI-DS-44', jobLink: '#', resumeLink: '#' },
            { company: 'Bank of America', title: 'Technology Analyst Program', jobId: 'BOA-TAP-24', jobLink: '#', resumeLink: '#' },
            { company: 'Bank of New York Mellon', title: 'Risk Management Specialist', jobId: 'BNY-RM-98', jobLink: '#', resumeLink: '#' },
            { company: 'Oracle', title: 'Cloud Solutions Engineer', jobId: 'ORA-CSE-76', jobLink: '#', resumeLink: '#' },
            { company: 'Goldman Sachs', title: 'Quantitative Strategist', jobId: 'GS-QS-13', jobLink: '#', resumeLink: '#' },
            { company: 'HCLTech', title: 'IT Consultant', jobId: 'HCL-ITC-55', jobLink: '#', resumeLink: '#' },
            { company: 'Infosys', title: 'Lead Consultant', jobId: 'INFY-LC-01', jobLink: '#', resumeLink: '#' },
            { company: 'Rolls-Royce', title: 'Mechanical Engineer', jobId: 'RR-ME-42', jobLink: '#', resumeLink: '#' },
            { company: 'Nationwide Bank', title: 'Product Manager', jobId: 'NW-PM-33', jobLink: '#', resumeLink: '#' },
            { company: 'JLR (Jaguar Land Rover)', title: 'Automotive Designer', jobId: 'JLR-AD-07', jobLink: '#', resumeLink: '#' },
            { company: 'Microsoft', title: 'Software Engineer II', jobId: 'MSFT-SWE2-99', jobLink: '#', resumeLink: '#' },
            { company: 'BCG', title: 'Management Consultant', jobId: 'BCG-CON-18', jobLink: '#', resumeLink: '#' },
            { company: 'Alphasense', title: 'Backend Engineer', jobId: 'AS-BE-22', jobLink: '#', resumeLink: '#' },
            { company: 'Hilti', title: 'Project Manager', jobId: 'HIL-PM-67', jobLink: '#', resumeLink: '#' },
            { company: 'AWS', title: 'Solutions Architect', jobId: 'AWS-SA-81', jobLink: '#', resumeLink: '#' },
            { company: 'Google', title: 'Product Marketing Manager', jobId: 'GOOG-PMM-12', jobLink: '#', resumeLink: '#' },
            { company: 'Cognizant', title: 'Digital Strategy Consultant', jobId: 'COG-DSC-49', jobLink: '#', resumeLink: '#' },
            { company: 'FNZ', title: 'Fintech Analyst', jobId: 'FNZ-FA-30', jobLink: '#', resumeLink: '#' },
            { company: 'CBRE', title: 'Real Estate Analyst', jobId: 'CBRE-REA-25', jobLink: '#', resumeLink: '#' },
            { company: 'Dunnhumby', title: 'Data Analyst', jobId: 'DH-DA-15', jobLink: '#', resumeLink: '#' },
            { company: 'S&P Global', title: 'Market Intelligence Analyst', jobId: 'SPG-MI-60', jobLink: '#', resumeLink: '#' },
            { company: 'Accenture', title: 'Technology Consulting Analyst', jobId: 'ACN-TCA-71', jobLink: '#', resumeLink: '#' },
            { company: 'Virtusa', title: 'Java Full Stack Developer', jobId: 'VRT-JFS-92', jobLink: '#', resumeLink: '#' },
            { company: 'Publicis Sapient', title: 'Digital Product Manager', jobId: 'PS-DPM-37', jobLink: '#', resumeLink: '#' },
            { company: 'PwC', title: 'Deals Associate', jobId: 'PWC-DA-53', jobLink: '#', resumeLink: '#' },
            { company: 'LTIMindtree', title: 'Cloud Infrastructure Engineer', jobId: 'LTIM-CIE-48', jobLink: '#', resumeLink: '#' }
        ];

        // --- DOM ELEMENTS ---
        const jobGrid = document.getElementById('job-grid');
        const searchInput = document.getElementById('searchInput');
        const notFoundMessage = document.getElementById('not-found');

        // --- FUNCTIONS ---

        /**
         * Renders the job cards to the page based on an array of job objects.
         * @param {Array} jobsToRender - The array of jobs to display.
         */
        function renderJobs(jobsToRender) {
            // Clear the grid before rendering new jobs
            jobGrid.innerHTML = '';
            
            // Show or hide the "not found" message
            if (jobsToRender.length === 0) {
                notFoundMessage.classList.remove('hidden');
            } else {
                notFoundMessage.classList.add('hidden');
            }

            jobsToRender.forEach(job => {
                const card = `
                    <div class="bg-gray-800 border border-gray-700 rounded-xl overflow-hidden shadow-lg transform hover:-translate-y-1 transition-all duration-300">
                        <div class="p-6">
                            <div class="flex items-start justify-between">
                                <div class="flex-1">
                                    <p class="text-sm font-semibold text-blue-400">${job.title}</p>
                                    <h3 class="text-xl font-bold text-white mt-1">${job.company}</h3>
                                    <p class="text-xs text-gray-500 mt-2">Job ID: ${job.jobId}</p>
                                </div>
                                <div class="flex-shrink-0 ml-4">
                                    <img src="https://logo.clearbit.com/${job.company.toLowerCase().replace(/ /g, '').replace(/&/g,'').split(',')[0]}.com?size=50" 
                                         onerror="this.onerror=null;this.src='https://placehold.co/50x50/374151/E5E7EB?text=${job.company.charAt(0)}';" 
                                         alt="${job.company} Logo" class="h-12 w-12 rounded-lg bg-gray-700 object-contain p-1">
                                </div>
                            </div>
                            <div class="mt-6 flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-3">
                                <a href="${job.jobLink}" target="_blank" class="w-full text-center px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-md transition-colors duration-200">View Job</a>
                                <a href="${job.resumeLink}" target="_blank" class="w-full text-center px-4 py-2 border border-gray-600 hover:bg-gray-700 text-gray-300 font-semibold rounded-md transition-colors duration-200">View Resume</a>
                            </div>
                        </div>
                    </div>
                `;
                jobGrid.innerHTML += card;
            });
        }

        /**
         * Handles the search input and filters jobs.
         */
        function handleSearch() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            const filteredJobs = jobs.filter(job => 
                job.company.toLowerCase().includes(searchTerm) || 
                job.title.toLowerCase().includes(searchTerm)
            );
            renderJobs(filteredJobs);
        }

        // --- EVENT LISTENERS ---
        searchInput.addEventListener('input', handleSearch);

        // --- INITIAL RENDER ---
        // Display all jobs when the page first loads
        document.addEventListener('DOMContentLoaded', () => {
            renderJobs(jobs);
        });

    </script>
</body>
</html>
